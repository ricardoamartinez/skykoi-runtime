services:
  - type: web
    name: SKYKOI
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SKYKOI_STATE_DIR
        value: /data/.SKYKOI
      - key: SKYKOI_WORKSPACE_DIR
        value: /data/workspace
      - key: SKYKOI_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: SKYKOI-data
      mountPath: /data
      sizeGB: 1
